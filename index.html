<!DOCTYPE html>
<html>
<head>
    <title>Soul Drain Monitor</title>
    <style>
        body { background: black; color: #00ff41; font-family: monospace; text-align: center; padding-top: 50px; }
        #gauge { width: 80%; height: 30px; border: 1px solid #00ff41; margin: 20px auto; position: relative; }
        #fill { height: 100%; background: #00ff00; width: 0%; transition: width 0.5s; }
        button { background: none; border: 1px solid #00ff41; color: #00ff41; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>📟 영혼 손실 모니터링 (Vercel)</h1>
    <div id="gauge"><div id="fill"></div></div>
    <p id="status">손실률: 0%</p>
    <button onclick="drainSoul()">한숨 내쉬기</button>
    <p id="advice" style="margin-top: 30px; color: red;"></p>

    <script>
        let gauge = 0;
        async function drainSoul() {
            // 비프음 재생
            let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.start(); setTimeout(() => osc.stop(), 200);

            // API 호출
            try {
                const res = await fetch('/api/sigh');
                const data = await res.json();
                
                gauge += 20;
                document.getElementById('fill').style.width = gauge + '%';
                document.getElementById('status').innerText = '손실률: ' + gauge + '%';
                document.getElementById('advice').innerText = data.message;

                if(gauge >= 100) {
                    alert("시스템 한계 초과. 현실로 돌아가십시오.");
                    location.reload();
                }
            } catch (e) {
                console.error("Error:", e);
                document.getElementById('advice').innerText = "서버 연결에 실패했습니다.";
            }
        }
    </script>
</body>
</html>
